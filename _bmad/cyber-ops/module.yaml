# Cybersecurity Operations (Cyber-Ops) Module Configuration
# This file defines installation questions and module configuration values

code: "cyber-ops"
name: "Cybersecurity Operations (Cyber-Ops)"
default_selected: false

# Welcome message shown during installation
prompt:
  - "🔒 Installing Cybersecurity Operations (Cyber-Ops) Module"
  - ""
  - "This module provides 15 specialized security agents:"
  - ""
  - "  Core Security Team:"
  - "  - Cipher (Threat Intelligence & APT Analysis)"
  - "  - Bastion (Security Architecture & Zero Trust)"
  - "  - Sentinel (Compliance & Governance)"
  - "  - Trace (Digital Forensics & Evidence)"
  - "  - Phoenix (Incident Command & Crisis)"
  - "  - Spectre (Penetration Testing & Red Team)"
  - ""
  - "  Extended Security Team:"
  - "  - Watchman (SOC Analysis & Detection)"
  - "  - Nimbus (Cloud Security - AWS/Azure/GCP)"
  - "  - Ledger (Blockchain & Web3 Security)"
  - "  - Weaver (Web Application Security)"
  - "  - Gateway (API Security & OAuth)"
  - "  - Oracle (AI/ML & LLM Security)"
  - "  - Shield (Blue Team Lead & Purple Team)"
  - "  - Phantom (Mobile App Security - iOS/Android)"
  - "  - Ghost (Social Engineering & Awareness)"
  - ""
  - "13 comprehensive security workflows included."
  - "Expert cybersecurity guidance integrated into your BMAD workflow."

# Core config values are automatically inherited from installer:
## user_name
## communication_language
## document_output_language

# ============================================================================
# CONFIGURATION FIELDS
# ============================================================================
# Each field can be:
# 1. INTERACTIVE (has 'prompt' - asks user during installation)
# 2. STATIC (no 'prompt' - just uses 'result' value)
# ============================================================================

# INTERACTIVE: Primary output location
output_folder:
  prompt: "Where should cyber-ops save security artifacts and documentation?"
  default: "_bmad-output/security"
  result: "{project-root}/{value}"

# STATIC: Module identification
module_code:
  result: "cyber-ops"

module_version:
  result: "1.3.0"

# STATIC: Module paths
agents_path:
  result: "{project-root}/_bmad/cyber-ops/agents"

workflows_path:
  result: "{project-root}/_bmad/cyber-ops/workflows"

# STATIC: Automatic subdirectory configuration
# These are derived from output_folder and created automatically by agents
planning_artifacts:
  result: "{output_folder}/planning"

operational_artifacts:
  result: "{output_folder}/operations"

documentation:
  result: "{output_folder}/docs"

# User skill level for security operations
user_skill_level:
  result: "intermediate"
