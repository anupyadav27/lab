# Tool Integration
tools:
  core_bmad:
    - party-mode
    - advanced-elicitation
    - brainstorming
  llm_features:
    - web-browsing
    - file-io
    - sidecar-file

# Framework Versions
frameworks:
  NIST_CSF: v1.1
  NIST_IR: SP_800-61_Rev2
  NIST_ZERO_TRUST: SP_800-207
  NIST_RISK: SP_800-30_Rev1
  MITRE_ATTACK: v14
  CIS_CONTROLS: v8
  OWASP_ASVS: v4.0
  ISO_27001: 2013
  STRIDE: Microsoft_2018

# Output Configuration
output:
  base_path: "{project-root}/_output/cyber-ops"
  incident_response:
    playbooks: playbooks
    incident_reports: incidents
  architecture_reviews: architecture
  threat_models: threat-models
  compliance: compliance
  vciso: vciso

  formats:
    - markdown

  include_metadata: true
  include_timestamps: true
  version_control: true

# Continuation Support
continuation:
  enabled: true
  state_tracking: frontmatter
  sidecar_files: true
  auto_resume: true

# Compliance Settings
compliance:
  gdpr:
    enabled: true
    notification_deadline_hours: 72
  pci_dss:
    enabled: true
    immediate_notification: true
  hipaa:
    enabled: true
    notification_deadline_days: 60
  sox:
    enabled: false
  state_breach_laws:
    enabled: true

# Security Settings
security:
  evidence_hashing: SHA256
  chain_of_custody: true
  access_control: true
  sensitive_data_handling: strict

# Quality Assurance
quality:
  min_threats_per_component: 3
  require_specific_recommendations: true
  require_risk_prioritization: true
  require_implementation_roadmap: true
  require_executive_summary: true

# Performance Settings
performance:
  recommended_model: claude-sonnet-4-5
  min_context_window: 200000
  parallel_processing: true
  caching: true

# Feature Flags
features:
  multi_session_continuation: true
  party_mode_integration: true
  web_browsing: true
  advanced_elicitation: true
  brainstorming: true
  sidecar_timeline: true
  auto_incident_id: true
  mitre_attack_mapping: true
  zero_trust_validation: true

# Module Metadata
metadata:
  author: BMAD Framework + Claude Opus 4.5
  created_by: workflow-builder
  total_workflows: 13
  total_agents: 15
  total_files: 149
  total_lines: 75000
  production_ready: true
  tested: true
  documented: true

